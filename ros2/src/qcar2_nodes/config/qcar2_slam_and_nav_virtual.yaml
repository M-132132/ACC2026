bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.1
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    use_realtime_priority: true

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 100.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 800
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.35
      vx_max: 0.323
      vx_min: -0.3
      vy_max: 0.0
      wz_max: 1.0
      ax_max: 1.0
      ax_min: -1.0
      ay_max: 3.0
      az_max: 3.5
      ###
      lookahead_dist: 0.8
      vtheta_max_allowed: 0.8
      ###
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.3

      critics: [
        "ConstraintCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 30.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        offset_from_furthest: 4
        threshold_to_consider: 3.14
        max_angle_to_furthest: 1.51
        mode: 0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 0.5


local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.02
      robot_radius: 0.12
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.6
        inflation_radius: 0.08
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan_correct
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.12
      resolution: 0.02
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan_correct
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 0.6
        inflation_radius: 0.08
      always_send_full_costmap: True

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: /workspaces/isaac_ros-dev/ros2/map/my_best_map2.yaml
    
amcl:
  ros__parameters:
    use_sim_time: False

    # # 🚨 开启自动设置初始位姿
    # set_initial_pose: true
    
    # # # 📍 填入从 QLabs 脚本换算来的坐标
    # initial_pose:
    #   x: -0.011
    #   y: 0.118
    #   z: 0.0
    #   yaw: -0.722  # 这是最准的标定角度

    scan_topic: /scan_correct  # <-- 强制指向修正后的雷达话题
    # 增加容忍度，防止因为微小的计算延迟导致 TF 报错
    transform_tolerance: 0.2
    # 以下为默认建议参数，确保定位稳定
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    #01291447
    update_min_d: 0.05       # 只要移动 5 厘米就重算定位（原值 0.2）
    update_min_a: 0.03       # 只要旋转约 3 度就重算定位（原值 0.5）
    resample_interval: 2      # 每次更新都进行重采样，让粒子迅速聚拢

    # 🚨 1. 运动模型 alpha 调整 (核心)
    # alpha1 是“旋转产生的旋转误差”，alpha2 是“平移产生的旋转误差”
    alpha1: 0.1  # 从 0.2 调大到 0.4，增加对旋转误差的容忍度
    alpha2: 0.2  # 同上
    alpha3: 0.07  # 平移误差通常较准，保持小
    alpha4: 0.12
    
    # 🎯 2. 增强雷达匹配权重
    laser_z_hit: 0.95      # 提高雷达点对准墙壁的权重
    laser_z_rand: 0.05     # 降低随机噪声权重
    laser_sigma_hit: 0.1   # 匹配误差标准差，越小越严苛，越精准
    laser_max_beams: 60    # 算力够(5070)，多用点雷达线，增强旋转时的特征匹配
    
    # 🚀 3. 加快恢复速度
    recovery_alpha_fast: 0.1  # 当发现定位偏离时，更快地重新分布粒子

nav2_qcar2_converter:
  ros__parameters:
    steer_bias: -0.008  # 在这里改，不需要重新编译


planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.2
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# =========================================
# 添加速度平滑器配置
# =========================================
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    feedback: "OPEN_LOOP"  # 关键：我们不看里程计反馈，强制限制指令
    scale_velocities: False
    
    # 1. 速度限制 (根据你的 QCar 调整)
    max_velocity: [0.5, 0.0, 1.0]  # [x, y, theta] 只允许X轴移动
    min_velocity: [-0.3, 0.0, -2.0] # 允许缓慢倒车
    
    # 2. 🚨 核心防滑配置：加速度限制 🚨
    # 这里是最后一道防线。就算 MPPI 发出 10.0 的指令，
    # 平滑器也会把它切分成 0.5, 0.55, 0.6... 慢慢发给小车。
    max_accel: [2.0, 0.0, 2.0]    # [x, y, theta] 建议设为 0.5 防打滑
    max_decel: [-4.0, 0.0, -2.0]    # 刹车可以稍微快一点
    
    # 3. 角速度/角加速度限制
    # 防止转向太猛导致失控
    max_velocity_theta: 1.0       # 最大转向速度
    min_velocity_theta: -1.0
    max_accel_theta: 5.0          # 转向加速度限制
    max_decel_theta: -10.0

    # 死区 (忽略极其微小的指令)
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0  #1.0
    min_rotational_vel: 0.4 #0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
      
lifecycle_manager_localization:
  ros__parameters:
    # 🚨 关键参数：设置为 true，启动后自动激活定位相关的节点
    autostart: true
    # 这里的节点名称必须与你命令行看到的完全一致
    node_names: ['map_server', 'amcl']
    bond_timeout: 4.0

lifecycle_manager_navigation:
  ros__parameters:
    # 🚨 关键参数：设置为 true，启动后自动激活路径规划和控制节点
    autostart: true
    node_names: ['controller_server', 
                 'planner_server', 
                 'behavior_server', 
                 'bt_navigator', 
                 'waypoint_follower', 
                 'smoother_server', 
                 'velocity_smoother']
    bond_timeout: 4.0